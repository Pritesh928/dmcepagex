<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dmce-Pagex</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-hover: #444;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8f04d;
      --accent-dim: rgba(200, 240, 77, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 20px;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .drop-zone:hover .drop-icon { color: var(--accent); }

    .drop-label {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .drop-label span {
      color: var(--text);
      font-weight: 500;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(200, 240, 77, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text);
    }

    .file-info.visible { display: flex; }

    .file-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Dmce-Pagex</div>
  <h1>Process a PDF</h1>
  <p class="subtitle">Upload your file and we'll handle the rest.</p>

  <form action="https://dmcepagex.onrender.com/api/pdf/process" method="post" enctype="multipart/form-data">

    <div class="drop-zone" id="dropZone">
      <input type="file" name="pdf" accept=".pdf" required id="fileInput">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <p class="drop-label"><span>Click to browse</span> or drag & drop<br>PDF files only</p>
    </div>

    <div class="file-info" id="fileInfo">
      <div class="file-dot"></div>
      <span class="file-name" id="fileName"></span>
    </div>

    <button type="submit" id="submitBtn" disabled>Process PDF</button>

    <div class="divider"></div>
    <p class="footer-note">File is sent securely to the API endpoint.</p>
  </form>
</div>

<script>
  const input = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const dropZone = document.getElementById('dropZone');

  input.addEventListener('change', () => {
    if (input.files.length) {
      fileName.textContent = input.files[0].name;
      fileInfo.classList.add('visible');
      submitBtn.disabled = false;
    }
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) {
      input.files = e.dataTransfer.files;
      input.dispatchEvent(new Event('change'));
    }
  });
</script>

</body>
</html>
